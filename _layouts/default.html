<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title == "Home" %}{{ site.title }}{% else %}{{ page.title }} — {{ site.title }}{% endif %}
  </title>
  {% if page.canonical_url %}
  <link rel="canonical" href="{{ page.canonical_url }}">
  {% endif %}
  <script data-goatcounter="https://henryaj.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">
  <link rel="shortcut icon" href="{{ site.baseurl }}/public/favicon.ico">
  <style>
    body {
      font-family: monospace;
      max-width: 480px;
      margin: 80px auto;
      padding: 0 20px;
      line-height: 1.6;
      font-size: 1.1em;
      color: #222;
    }
    a { color: #222; }
    h1 { font-size: 1.4em; margin: 0.6em 0 0.2em; }
    h2 { font-size: 1.2em; margin: 1.5em 0 0.3em; }
    h3 { font-size: 1.1em; margin: 1.2em 0 0.3em; }
    hr { border: none; border-top: 1px solid #ccc; margin: 1em 0; }
    img { max-width: 100%; height: auto; }
    figure { margin: 1.5em 0; }
    figcaption { font-size: 0.85em; color: #666; margin-top: 0.5em; }
    blockquote {
      border-left: 3px solid #ccc;
      margin: 1em 0;
      padding: 0 1em;
      color: #555;
    }
    pre, code { font-size: 0.9em; }
    pre { overflow-x: auto; padding: 1em; background: #f5f5f5; }
    .site-nav { font-size: 0.9em; margin-bottom: 2em; }
    .site-nav a { margin-right: 1em; }
    .meta { font-size: 0.85em; color: #666; margin: 0.3em 0 1.5em; }
    .footnote { font-size: 0.85em; color: #666; border-top: 1px solid #eee; margin-top: 2em; padding-top: 1em; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="/">Henry Stanley</a>
    <a href="/archive">Archive</a>
    <a href="/now">Now</a>
  </nav>

  {{ content }}

</body>
</html>
